spring:
  application:
    name: liftloggerweb

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/liftloggerweb}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false

  flyway:
    locations: classpath:db/migration
